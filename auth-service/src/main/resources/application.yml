server:
  port: 8081
spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://postgres:5432/uber_auth
    username: postgres
    password: ${DB_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
app:
  jwt:
    secret: ${JWT_SECRET:Secret_keyhinihuoi7tvihulkjklbih9gh8gfd5rgbvjbj}
    access-expiration-ms: 86400000
    refresh-expiration-ms: 604800000
